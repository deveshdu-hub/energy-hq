<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>India Energy Future HQ</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#050816;
color:white;
min-height:100vh;
padding:20px;
display:flex;
justify-content:center;
align-items:center;
}

.container{
width:100%;
max-width:500px;
background:rgba(255,255,255,0.03);
border:1px solid rgba(255,255,255,0.08);
padding:30px;
border-radius:30px;
box-shadow:0 0 40px rgba(0,255,255,0.15);
backdrop-filter:blur(10px);
}

h1{
font-size:32px;
text-align:center;
margin-bottom:20px;
background:linear-gradient(90deg,#00d4ff,#8b5cf6);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.description{
text-align:center;
font-size:18px;
line-height:1.7;
margin-bottom:35px;
color:#cbd5e1;
}

input{
width:100%;
padding:18px;
margin-bottom:20px;
border-radius:18px;
border:1px solid rgba(255,255,255,0.1);
background:#081028;
color:white;
font-size:18px;
outline:none;
}

button{
width:100%;
padding:20px;
border:none;
border-radius:20px;
font-size:22px;
font-weight:bold;
cursor:pointer;
background:linear-gradient(90deg,#06b6d4,#8b5cf6);
color:white;
transition:0.3s;
}

button:hover{
transform:scale(1.02);
}

.result-card{
margin-top:25px;
padding:25px;
border-radius:20px;
background:#111827;
box-shadow:0 0 25px rgba(0,255,255,0.2);
}

.result-card h2{
margin-bottom:15px;
}

.result-card p{
margin-bottom:12px;
font-size:18px;
line-height:1.5;
}

</style>
</head>

<body>

<div class="container">

<h1>⚡ India Energy Future HQ</h1>

<p class="description">
Discover how much money you could save by switching
from petrol to electric vehicles using AI-powered
India-specific clean energy estimates.
</p>

<input type="number" id="petrolSpend" placeholder="Monthly Petrol Spend ₹" />

<input type="number" id="dailyDistance" placeholder="Daily Driving Distance (KM)" />

<input type="number" id="electricityCost" placeholder="Electricity Cost Per Unit ₹" />

<input type="text" id="cityName" placeholder="City Name" />

<button onclick="calculateEVSavings()">
⚡ Calculate My EV Savings
</button>

<div id="results"></div>

</div>

<script>

function calculateEVSavings() {

const petrolSpend =
parseFloat(document.getElementById("petrolSpend").value) || 0;

const dailyDistance =
parseFloat(document.getElementById("dailyDistance").value) || 0;

const electricityCost =
parseFloat(document.getElementById("electricityCost").value) || 0;

const city =
document.getElementById("cityName").value;

const petrolPrice = 105;
const petrolMileage = 15;
const evEfficiency = 0.15;

const monthlyDistance = dailyDistance * 30;

const petrolLitres = monthlyDistance / petrolMileage;

const petrolMonthlyCost =
petrolLitres * petrolPrice;

const evUnits =
monthlyDistance * evEfficiency;

const evMonthlyCost =
evUnits * electricityCost;

const monthlySavings =
petrolMonthlyCost - evMonthlyCost;

const yearlySavings =
monthlySavings * 12;

document.getElementById("results").innerHTML = `

<div class="result-card">

<h2>⚡ EV Savings Report</h2>

<p><strong>City:</strong> ${city}</p>

<p><strong>Monthly Petrol Cost:</strong>
₹${petrolMonthlyCost.toFixed(0)}</p>

<p><strong>Monthly EV Cost:</strong>
₹${evMonthlyCost.toFixed(0)}</p>

<p><strong>Monthly Savings:</strong>
₹${monthlySavings.toFixed(0)}</p>

<p><strong>Yearly Savings:</strong>
₹${yearlySavings.toFixed(0)}</p>

</div>

`;

}

</script>

</body>
</html>
