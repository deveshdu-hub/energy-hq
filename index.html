<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>India Energy Future HQ ⚡</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(180deg,#001220,#001d33);
    color:white;
    min-height:100vh;
    padding:20px;
}

.container{
    max-width:500px;
    margin:auto;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(20px);
    border-radius:30px;
    padding:30px 25px;
    box-shadow:0 0 40px rgba(0,200,255,0.15);
    border:1px solid rgba(255,255,255,0.08);
}

h1{
    font-size:48px;
    line-height:1.2;
    margin-bottom:20px;
    text-align:center;
}

.subtitle{
    text-align:center;
    color:#c7d4e5;
    font-size:20px;
    line-height:1.6;
    margin-bottom:35px;
}

.form-grid{
    display:grid;
    grid-template-columns:1fr;
    gap:15px;
    margin-bottom:25px;
}

input, select{
    width:100%;
    padding:18px;
    border-radius:18px;
    border:1px solid rgba(255,255,255,0.15);
    background:rgba(10,15,40,0.9);
    color:white;
    font-size:16px;
    outline:none;
}

input::placeholder{
    color:#c7d4e5;
}

select{
    color:white;
}

button{
    width:100%;
    border:none;
    padding:22px;
    border-radius:22px;
    margin-top:18px;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.primary-btn{
    background:linear-gradient(90deg,#00c6ff,#8b5cf6);
    color:white;
    box-shadow:0 0 25px rgba(0,200,255,0.35);
}

.secondary-btn{
    background:linear-gradient(90deg,#25D366,#128C7E);
    color:white;
    box-shadow:0 0 25px rgba(37,211,102,0.35);
}

button:hover{
    transform:scale(1.02);
}

.result-box{
    margin-top:30px;
    background:rgba(255,255,255,0.06);
    border-radius:20px;
    padding:20px;
    display:none;
}

.result-box h2{
    margin-bottom:15px;
}

.result-box p{
    margin-bottom:10px;
    line-height:1.6;
    color:#d6e2f0;
}

.footer{
    text-align:center;
    margin-top:30px;
    color:#7f96b2;
    font-size:14px;
    line-height:1.8;
}

.whatsapp-box{
    margin-top:20px;
    text-align:center;
}

.whatsapp-link{
    display:inline-block;
    padding:14px 24px;
    border-radius:18px;
    text-decoration:none;
    background:linear-gradient(90deg,#25D366,#128C7E);
    color:white;
    font-weight:bold;
    box-shadow:0 0 20px rgba(37,211,102,0.35);
}

@media(max-width:600px){

    h1{
        font-size:32px;
    }

    .subtitle{
        font-size:18px;
    }

}

</style>
</head>

<body>

<div class="container">

<h1>
Join India’s Clean<br>
Energy Future ⚡
</h1>

<p class="subtitle">
Get early access to AI energy tools, subsidy alerts, charging intelligence, and future EV insights.
</p>

<div class="form-grid">

<input type="number" id="km" placeholder="Monthly KM Driven">

<input type="number" id="petrol" placeholder="Petrol Price ₹/Litre">

<input type="number" id="electricity" placeholder="Electricity Cost ₹/Unit">

<select id="ev">
<option value="">Select EV</option>
<option value="Tata Nexon EV">Tata Nexon EV</option>
<option value="MG ZS EV">MG ZS EV</option>
<option value="Mahindra XUV400">Mahindra XUV400</option>
<option value="Tata Tiago EV">Tata Tiago EV</option>
<option value="BYD Atto 3">BYD Atto 3</option>
</select>

</div>

<button class="primary-btn" onclick="calculateSavings()">
⚡ Get AI EV Savings Report
</button>

<button class="secondary-btn" onclick="joinWaitlist()">
📲 Join WhatsApp Waitlist
</button>

<div class="whatsapp-box">

<a class="whatsapp-link"
href="https://wa.me/919250036334?text=Hi%20India%20Energy%20Future%20HQ%20⚡%20I%20want%20to%20join%20the%20EV%20waitlist"
target="_blank">

Chat on WhatsApp → 9250036334

</a>

</div>

<div class="result-box" id="result">

<h2>⚡ AI EV Savings Report</h2>

<p id="monthlySaving"></p>

<p id="yearlySaving"></p>

<p id="recommendation"></p>

</div>

<div class="footer">
India Energy Future HQ © 2026<br>
Future Mobility • AI • Clean Energy
</div>

</div>

<script>

function calculateSavings(){

    const km = parseFloat(document.getElementById("km").value);
    const petrol = parseFloat(document.getElementById("petrol").value);
    const electricity = parseFloat(document.getElementById("electricity").value);
    const ev = document.getElementById("ev").value;

    if(!km || !petrol || !electricity || !ev){

        alert("Please fill all details");

        return;
    }

    const petrolCarMileage = 15;

    const evEfficiency = 0.15;

    const monthlyPetrolCost =
        (km / petrolCarMileage) * petrol;

    const monthlyEVCost =
        km * evEfficiency * electricity;

    const monthlySavings =
        monthlyPetrolCost - monthlyEVCost;

    const yearlySavings =
        monthlySavings * 12;

    document.getElementById("monthlySaving").innerHTML =
        "💰 Estimated Monthly Savings: ₹" +
        Math.round(monthlySavings);

    document.getElementById("yearlySaving").innerHTML =
        "📈 Estimated Yearly Savings: ₹" +
        Math.round(yearlySavings);

    document.getElementById("recommendation").innerHTML =
        "🤖 AI Recommendation: Based on your usage, <b>" +
        ev +
        "</b> is a smart EV choice for long-term savings and clean driving.";

    document.getElementById("result").style.display = "block";
}

function joinWaitlist(){

    window.location.href =
    "https://wa.me/919250036334?text=Hi%20India%20Energy%20Future%20HQ%20⚡%20I%20want%20to%20join%20the%20EV%20waitlist";

}

</script>

</body>
</html>
